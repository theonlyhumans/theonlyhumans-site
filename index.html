<style>
  :root {
    --sky:       #b8bfc2;
    --ink:       #1f2328;
    --ink-soft:  #4a525c;
    --ink-ghost: rgba(31, 35, 40, 0.45);
    --rose:      #8f5f64;
    --rose-deep: #684244;

    --sans-display: 'Instrument Sans', ui-sans-serif, system-ui, sans-serif;
    --sans-body:    'DM Sans', ui-sans-serif, system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--sky);
    color: var(--ink);
    font-family: var(--sans-body);
    font-size: 17px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "kern", "ss01";
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 22px;
  }

  a { color: inherit; text-decoration: none; }

  /* ——— The whole thing is one centered block ——— */
  .center {
    width: 100%;
    max-width: 440px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.6s ease-out 0.3s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* wordmark */
  .wordmark {
    font-family: var(--sans-display);
    font-weight: 300;
    font-size: clamp(28px, 4vw, 36px);
    letter-spacing: -0.01em;
    text-transform: lowercase;
    color: var(--ink);
    margin-bottom: 40px;
  }

  /* hairline */
  .rule {
    width: 48px;
    height: 1px;
    background: rgba(31, 35, 40, 0.25);
    margin: 0 auto 40px;
  }

  /* ——— email form ——— */
  form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 56px;
  }
  input[type="email"] {
    flex: 1 1 220px;
    min-width: 0;
    background: transparent;
    border: 0;
    border-bottom: 1px solid rgba(31, 35, 40, 0.4);
    padding: 10px 0;
    font-family: var(--sans-body);
    font-size: 16px;
    color: var(--ink);
    outline: none;
    text-align: center;
    transition: border-color 0.3s ease;
  }
  input[type="email"]:focus { border-bottom-color: var(--rose); }
  input[type="email"]::placeholder { color: var(--ink-soft); }
  button {
    background: transparent;
    border: 1px solid var(--ink-soft);
    padding: 10px 26px;
    font-family: var(--sans-body);
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: lowercase;
  }
  button:hover {
    background: var(--ink);
    color: var(--sky);
    border-color: var(--ink);
  }
  .msg {
    margin-top: 14px;
    font-family: var(--sans-body);
    font-size: 13px;
    color: var(--ink-soft);
    min-height: 18px;
  }

  /* ——— socials ——— */
  .socials {
    display: flex;
    justify-content: center;
    gap: 24px;
  }
  .socials a {
    width: 20px;
    height: 20px;
    color: var(--ink-soft);
    transition: color 0.3s ease, transform 0.3s ease;
    display: inline-block;
  }
  .socials a:hover {
    color: var(--rose);
    transform: translateY(-2px);
  }
  .socials a svg { width: 100%; height: 100%; fill: currentColor; }

  @media (prefers-reduced-motion: reduce) {
    .center { opacity: 1; transform: none; animation: none; }
  }
</style>

<script>
  const form = document.getElementById('mc-form');
  const msg = document.getElementById('mc-msg');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = form.querySelector('input[type="email"]').value.trim();
    if (!email) return;
    msg.textContent = 'sending...';

    const action = form.action.replace('/post?', '/post-json?');
    const data = new URLSearchParams(new FormData(form)).toString();
    const cbName = 'mc_cb_' + Math.random().toString(36).slice(2);
    const url = `${action}&${data}&c=${cbName}`;

    const script = document.createElement('script');
    window[cbName] = (res) => {
      if (res.result === 'success') {
        msg.textContent = 'thank you.';
        form.reset();
      } else {
        const clean = (res.msg || 'something went wrong. please try again.').replace(/<[^>]*>/g, '');
        msg.textContent = clean;
      }
      delete window[cbName];
      script.remove();
    };
    script.src = url;
    script.onerror = () => { msg.textContent = 'something went wrong. please try again.'; };
    document.body.appendChild(script);
  });
</script>
